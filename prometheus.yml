global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s

scrape_configs:
  # Zyxel Cellwan Exporter
  - job_name: 'zyxel-cellwan-exporter'
    static_configs:
      - targets: ['zyxel-cellwan-exporter:9101']
        labels:
          instance: 'zyxel-5g-router'
    scrape_interval: 30s
    scrape_timeout: 10s
