version: '3.8'

services:
  # Cellwan Exporter
  cellwan-exporter:
    build: .
    container_name: cellwan-exporter
    restart: unless-stopped
    ports:
      - "9101:9101"
    environment:
      - ZYXEL_HOST=${ZYXEL_HOST}
      - ZYXEL_USER=${ZYXEL_USER}
      - ZYXEL_PASSWORD=${ZYXEL_PASSWORD}
      - EXPORTER_PORT=9101
      - EXPORTER_IP=0.0.0.0
      - SCRAPE_INTERVAL=${SCRAPE_INTERVAL:-30}
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9101/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    depends_on:
      - cellwan-exporter

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitoring
    depends_on:
      - prometheus

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
