# Exporter Only
# Use this if you already have Prometheus/Grafana running elsewhere

services:
  zyxel-cellwan-exporter:
    build:
      context: .
      tags:
        - zyxel-cellwan-exporter:latest
    image: zyxel-cellwan-exporter:latest
    container_name: zyxel-cellwan-exporter
    restart: unless-stopped
    ports:
      - "9101:9101"
    env_file:
      # Set environment values in a .env file. see .env.exmaple
      - .env
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9101/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  monitoring:
    driver: bridge
