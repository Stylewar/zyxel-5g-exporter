stages:
  - mirror

mirror_to_github:
  stage: mirror
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: "0"
    GITHUB_PRIVATE: "true"   # "false" wenn public Repo gewünscht
  script:
    - apk add --no-cache git ca-certificates curl
    - git config --global user.email "mirror@linuxguy.de"
    - git config --global user.name "GitLab Mirror"

    - export TARGET_REPO="${GITHUB_REPO:-$CI_PROJECT_NAME}"

    # Repo auf GitHub anlegen, falls es noch nicht existiert
    - |
      if ! curl -fsS \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        -H "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/${GITHUB_USER}/${TARGET_REPO}" >/dev/null; then
        echo "GitHub Repo ${GITHUB_USER}/${TARGET_REPO} existiert nicht -> wird erstellt…"
        curl -fsS -X POST \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/user/repos" \
          -d "{\"name\":\"${TARGET_REPO}\",\"private\":${GITHUB_PRIVATE}}"
      else
        echo "GitHub Repo existiert bereits."
      fi

    # Mirror push (Branches + Tags), ohne prune (damit GitHub nicht wegen Default-Branch rumzickt)
    - git clone --mirror . repo.git
    - cd repo.git
    - |
      git push --force "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${TARGET_REPO}.git" \
        "+refs/heads/*:refs/heads/*" \
        "+refs/tags/*:refs/tags/*"
