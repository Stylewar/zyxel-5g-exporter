mirror_to_github:
  stage: mirror
  image: alpine:3.20
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git
    - git config --global user.email "mirror@linuxguy.de"
    - git config --global user.name "GitLab Mirror"
  script:
    - rm -rf repo.git
    - git clone --bare . repo.git
    - cd repo.git
    - git fetch --all --tags

    # Backup push: nur aktualisieren, nichts löschen
    - >
      git push
      "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${CI_PROJECT_NAME}.git"
      "+refs/heads/*:refs/heads/*"
      "+refs/tags/*:refs/tags/*"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
