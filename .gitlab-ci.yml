stages:
  - mirror

mirror_to_github:
  stage: mirror
  image: alpine:latest
  rules:
    # Spiegel nur main (oder ändere auf master)
    - if: '$CI_COMMIT_BRANCH == "main"'
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: "0"          # wichtig: komplette Historie + Tags
  script:
    - apk add --no-cache git ca-certificates
    - git config --global user.email "mirror@linuxguy.de"
    - git config --global user.name "GitLab Mirror"

    # Ziel-Repo: entweder explizit per Variable oder Projektname
    - export TARGET_REPO="${GITHUB_REPO:-$CI_PROJECT_NAME}"

    # Mirror-Klon aus dem bereits vorhandenen Checkout
    - git clone --mirror . repo.git
    - cd repo.git

    # Force-update Branches + Tags (ohne prune => GitHub versucht nicht main zu löschen)
    - git push --force "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${TARGET_REPO}.git" \
        "+refs/heads/*:refs/heads/*" \
        "+refs/tags/*:refs/tags/*"
