---
name: Mirror to GitHub

'on':
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: docker
    env:
      GH_CREATE_REPO: "true"
      GH_CREATE_PRIVATE_REPO: "true"

    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all refs
        run: |
          git fetch --prune --unshallow || true
          git fetch --all --tags --prune

      - name: Push mirror to GitHub
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_USERNAME" ] || [ -z "$GH_TOKEN" ]; then
            echo "GH_USERNAME and GH_TOKEN must be set as" \
              "Forgejo Actions secrets."
            exit 1
          fi

          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          GITHUB_REMOTE="https://${GH_USERNAME}:${GH_TOKEN}@github.com/${GH_USERNAME}/${REPO_NAME}.git"
          CREATE_REPO="$(printf '%s' "${GH_CREATE_REPO}" \
            | tr '[:upper:]' '[:lower:]')"
          CREATE_PRIVATE_REPO="$(printf '%s' "${GH_CREATE_PRIVATE_REPO}" \
            | tr '[:upper:]' '[:lower:]')"

          if [ "$CREATE_REPO" = "true" ]; then
            if ! curl -fsS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GH_USERNAME}/${REPO_NAME}" \
              >/dev/null; then
              echo "GitHub repository ${GH_USERNAME}/${REPO_NAME}" \
                "does not exist. Creating it now."
              payload="{\"name\":\"${REPO_NAME}\",\"private\":${CREATE_PRIVATE_REPO}}"
              curl -fsS -X POST \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/user/repos" \
                -d "${payload}"
            fi

            echo "Waiting for GitHub repository ${GH_USERNAME}/${REPO_NAME}" \
              "to become ready for git push."
            for attempt in $(seq 1 12); do
              if git ls-remote "$GITHUB_REMOTE" >/dev/null 2>&1; then
                echo "GitHub repository is ready."
                break
              fi

              if [ "$attempt" -eq 12 ]; then
                echo "GitHub repository did not become ready in time." >&2
                exit 1
              fi

              sleep 5
            done
          fi

          git remote remove github-mirror 2>/dev/null || true
          git remote add github-mirror "$GITHUB_REMOTE"

          # Mirror all branches and tags. This intentionally avoids deleting
          # unrelated refs outside normal heads/tags namespaces.
          git push github-mirror --force --all
          git push github-mirror --force --tags
