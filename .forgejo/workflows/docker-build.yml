name: Docker Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build OCI image tarball with Kaniko
        uses: docker://gcr.io/kaniko-project/executor:v1.23.2-debug
        with:
          args: >-
            --context=dir:///github/workspace
            --dockerfile=/github/workspace/Dockerfile
            --destination=local/zyxel-5g-exporter:test
            --no-push
            --tar-path=/github/workspace/zyxel-5g-exporter-image.tar

      - name: Verify image tarball exists
        run: |
          test -f zyxel-5g-exporter-image.tar
          ls -lh zyxel-5g-exporter-image.tar
