name: test-runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: docker
    container:
      image: forgejo-ci:29

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show versions
        run: |
          docker --version
          node --version
          git --version

      - name: Show workspace
        run: |
          pwd
          ls -la
