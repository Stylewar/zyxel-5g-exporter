---
name: docker-build

'on':
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: docker
    container:
      image: forgejo.lnxcloud.de/stylewar/forgejo-ci:29

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show versions
        run: |
          docker --version
          node --version
          git --version

      - name: Login to Forgejo container registry
        env:
          REGISTRY_USERNAME: ${{ secrets.FG_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.FG_REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" |
            docker login forgejo.lnxcloud.de \
              -u "$REGISTRY_USERNAME" \
              --password-stdin

      - name: Build image
        run: |
          docker build \
            -t forgejo.lnxcloud.de/stylewar/zyxel-5g-exporter:latest \
            .

      - name: Push image
        run: |
          docker push forgejo.lnxcloud.de/stylewar/zyxel-5g-exporter:latest
