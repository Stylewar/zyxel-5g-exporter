name: docker-build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: docker
    container:
      image: forgejo-ci:29

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show versions
        run: |
          docker --version
          node --version
          git --version

      - name: Login to Forgejo container registry
        env:
          REGISTRY_USERNAME: ${{ secrets.FG_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.FG_REGISTRY_PASSWORD }}
        run: |
          if [ -z "$REGISTRY_USERNAME" ]; then
            echo "FG_REGISTRY_USERNAME is empty"
            exit 1
          fi

          if [ -z "$REGISTRY_PASSWORD" ]; then
            echo "FG_REGISTRY_PASSWORD is empty"
            exit 1
          fi

          echo "Using registry host: forgejo.lnxcloud.de"
          echo "Using registry username: $REGISTRY_USERNAME"
          echo "$REGISTRY_PASSWORD" | docker login forgejo.lnxcloud.de -u "$REGISTRY_USERNAME" --password-stdin

      - name: Build image
        run: |
          docker build -t forgejo.lnxcloud.de/stylewar/zyxel-5g-exporter:latest .

      - name: Push image
        run: |
          docker push forgejo.lnxcloud.de/stylewar/zyxel-5g-exporter:latest
